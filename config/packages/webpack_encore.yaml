webpack_encore:
    output_path: '%kernel.project_dir%/public/build'
    script_attributes:
        defer: true

when@dev:
    framework:
        assets:
            json_manifest_path: '%kernel.project_dir%/public/build/manifest.json'

when@prod:
    webpack_encore:
        strict_mode: false

when@test:
    webpack_encore:
        strict_mode: false
